name: presshop_enterprise
description: ShieldHop — Employee App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2
  firebase_analytics: ^11.1.0
  firebase_crashlytics: ^4.0.2

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # Dependency injection
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.6.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # UI
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_switch: ^0.3.2
  image_picker: ^1.0.4
  google_places_flutter: ^2.0.8
  qr_flutter: ^4.1.0
  otp_pin_field: ^1.1.2+2

  # Utils
  logger: ^2.4.0
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

  # Camera feature
  camera: ^0.11.0+2
  audio_waveforms: ^1.0.5
  cunning_document_scanner: ^1.2.3
  image_gallery_saver_plus: ^4.0.1
  mime: ^1.0.6
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  photo_manager: ^3.3.0
  record: ^5.1.2
  video_thumbnail: ^0.5.3
  video_player: ^2.9.2
  file_picker: ^8.1.6
  geocoding: ^3.0.0
  location: ^5.0.3
  dots_indicator: ^3.0.0
  path: ^1.9.1
  flutter_local_notifications: ^17.2.4
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2
  package_info_plus: ^8.1.0
  force_update_helper: ^0.2.1

  # Map feature
  google_maps_flutter: ^2.9.0
  audioplayers: ^6.1.0
  http: ^1.2.2
  flutter_lucide: ^1.11.0
  image: ^4.2.0
  geolocator: ^14.0.2
  flutter_background_service: ^5.1.0
  flutter_polyline_points: ^2.0.1
  share_plus: ^12.0.2
  webview_flutter: ^4.14.0
  syncfusion_flutter_pdfviewer: ^33.2.12
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/logo/
    - assets/animations/
    - assets/audio/
    - assets/markers/
    - assets/markers/gifs/
    - assets/markers/bg-removed/
    - assets/markers/marker-icons/
    - assets/rabbits/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: AirbnbCereal
      fonts:
        - asset: assets/fonts/AirbnbCereal_W_Bk.otf
          weight: 400
        - asset: assets/fonts/AirbnbCereal_W_Md.otf
          weight: 500
        - asset: assets/fonts/AirbnbCereal_W_Bd.otf
          weight: 700

dependency_overrides:
  record_linux: 1.3.1
